{% extends "base.html" %}
{% block title %}已送出作答{% endblock %}

{% block content %}
<div class="page-header">
  <h1>&#x2705; 已成功送出</h1>
  <p>{{ submission.student_name }}，你的「{{ questionnaire.name }}」作答已送出，正在等待 AI 老師批改。</p>
</div>

<div class="card">
  <p>你現在想要：</p>
  <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px;">
    <a href="/questionnaire/{{ submission.questionnaire_id }}" class="btn btn-primary">
      &#x27A1;&#xFE0F; 輸入下一筆資料
    </a>
    <a href="/" class="btn btn-secondary">
      &#x1F3E0; 結束作業回首頁
    </a>
  </div>
</div>
{% endblock %}
